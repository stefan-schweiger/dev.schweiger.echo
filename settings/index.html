<!doctype html>
<html>
  <head>
    <!-- The '/homey.js' script must be included in your settings view to work -->
    <script type="text/javascript" src="/homey.js" data-origin="settings"></script>
    <style>
      .hidden {
        display: none;
      }
      .center {
        text-align: center;
      }
      .homey-form-group {
        margin-bottom: 1rem;
      }
    </style>
  </head>
  <body>
    <header class="homey-header">
      <h1 class="homey-title" data-i18n="settings.title"></h1>
    </header>

    <div id="connect-container" class="hidden">
      <fieldset class="homey-form-fieldset">
        <div class="homey-form-group">
          <label class="homey-form-label" for="email" data-i18n="settings.email"></label>
          <input class="homey-form-input" type="email" id="email" autocomplete="username" />
        </div>
        <div class="homey-form-group">
          <label class="homey-form-label" for="password" data-i18n="settings.password"></label>
          <input class="homey-form-input" type="password" id="password" autocomplete="current-password" />
        </div>
        <div class="homey-form-group">
          <label class="homey-form-label" for="otp" data-i18n="settings.otp"></label>
          <input class="homey-form-input" type="text" id="otp" inputmode="numeric" autocomplete="one-time-code" />
          <p class="homey-form-hint" data-i18n="settings.otpHint"></p>
        </div>
      </fieldset>

      <button id="connect" class="homey-button-primary-full" data-i18n="settings.connect"></button>
      <button id="reset" class="homey-button-danger-full" data-i18n="settings.reset"></button>
    </div>

    <div id="connecting-container" class="hidden">
      <h1 class="homey-title center" data-i18n="settings.connecting"></h1>
      <button class="homey-button-primary-full is-loading" disabled></button>
    </div>

    <div id="connected-container" class="hidden">
      <h1 class="homey-title center" data-i18n="settings.connected"></h1>
      <p class="homey-subtitle center" data-i18n="settings.success"></p>
      <button id="disconnect" class="homey-button-danger-full" data-i18n="settings.disconnect"></button>
    </div>

    <script type="text/javascript">
      const showView = (view) => {
        document.getElementById('connect-container').classList.toggle('hidden', view !== 'form');
        document.getElementById('connecting-container').classList.toggle('hidden', view !== 'connecting');
        document.getElementById('connected-container').classList.toggle('hidden', view !== 'connected');
      };

      function onHomeyReady(Homey) {
        // Only alert an error if it followed a connect attempt the user made on this page
        // (avoids popping a stale error on load).
        let attempted = false;

        const checkStatus = () => {
          Homey.api('GET', '/status', undefined, (err, res) => {
            if (err || !res) return;
            if (res.state === 'connected') {
              attempted = false;
              showView('connected');
            } else if (res.state === 'connecting') {
              showView('connecting');
            } else {
              showView('form');
              if (attempted && res.error) {
                attempted = false;
                Homey.alert(res.error);
              }
            }
          });
        };

        checkStatus();
        setInterval(checkStatus, 2000);
        Homey.ready();

        document.getElementById('connect').addEventListener('click', () => {
          const body = {
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            otp: document.getElementById('otp').value,
          };
          attempted = true;
          showView('connecting'); // immediate feedback; polling takes over
          Homey.api('POST', '/connect', body, (err) => {
            if (err) {
              attempted = false;
              showView('form');
              return Homey.alert(err);
            }
            document.getElementById('password').value = '';
            document.getElementById('otp').value = '';
          });
        });

        document.getElementById('disconnect').addEventListener('click', () => {
          Homey.api('POST', '/disconnect', undefined, (err) => {
            if (err) return Homey.alert(err);
            showView('form');
          });
        });

        document.getElementById('reset').addEventListener('click', () => {
          Homey.api('POST', '/reset', undefined, (err) => {
            if (err) return Homey.alert(err);
            showView('form');
          });
        });
      }
    </script>
  </body>
</html>
